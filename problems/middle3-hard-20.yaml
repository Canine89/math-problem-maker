title: "중학교 3학년 고난도 수학 문제"
subtitle: "중학교 3학년 | 심화"
date: "2026-04-20"
time_limit: "90분"
total_points: 100

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      $\sqrt{48} - 3\sqrt{27} + 2\sqrt{75}$를 간단히 하시오.
    answer: |
      $\sqrt{48} = 4\sqrt{3}$, $3\sqrt{27} = 9\sqrt{3}$, $2\sqrt{75} = 10\sqrt{3}$이므로
      $$4\sqrt{3} - 9\sqrt{3} + 10\sqrt{3} = 5\sqrt{3}$$

  - id: 2
    type: short_answer
    points: 5
    question: |
      $\dfrac{2}{\sqrt{5} - \sqrt{3}} + \dfrac{2}{\sqrt{5} + \sqrt{3}}$의 값을 구하시오.
    answer: |
      유리화하면
      $$\frac{2(\sqrt{5}+\sqrt{3})}{2} + \frac{2(\sqrt{5}-\sqrt{3})}{2} = (\sqrt{5}+\sqrt{3}) + (\sqrt{5}-\sqrt{3}) = 2\sqrt{5}$$

  - id: 3
    type: short_answer
    points: 5
    question: |
      $x = \dfrac{1}{\sqrt{2}+1}$, $y = \dfrac{1}{\sqrt{2}-1}$일 때, $x^2 + y^2$의 값을 구하시오.
    answer: |
      $x = \sqrt{2}-1$, $y = \sqrt{2}+1$이므로
      $x + y = 2\sqrt{2}$, $xy = 1$
      $$x^2 + y^2 = (x+y)^2 - 2xy = 8 - 2 = 6$$

  - id: 4
    type: short_answer
    points: 5
    question: |
      다항식 $x^4 + 4$를 인수분해하시오.
    answer: |
      $$x^4 + 4 = x^4 + 4x^2 + 4 - 4x^2 = (x^2+2)^2 - (2x)^2 = (x^2+2x+2)(x^2-2x+2)$$

  - id: 5
    type: short_answer
    points: 5
    question: |
      $a + b = 5$, $ab = 3$일 때, $a^3 + b^3$의 값을 구하시오.
    answer: |
      $$a^3 + b^3 = (a+b)^3 - 3ab(a+b) = 125 - 45 = 80$$

  - id: 6
    type: multiple_choice
    points: 5
    question: |
      이차방정식 $2x^2 - 5x + k = 0$의 두 근의 비가 $2 : 3$일 때, 상수 $k$의 값은?
    choices:
      - "$2$"
      - "$3$"
      - "$\\frac{5}{2}$"
      - "$\\frac{75}{25}$"
    answer: 2

  - id: 7
    type: short_answer
    points: 5
    question: |
      이차방정식 $x^2 - 2x - 1 = 0$의 두 근을 $\alpha$, $\beta$라 할 때, $\dfrac{1}{\alpha^2} + \dfrac{1}{\beta^2}$의 값을 구하시오.
    answer: |
      $\alpha + \beta = 2$, $\alpha\beta = -1$이므로
      $$\frac{1}{\alpha^2} + \frac{1}{\beta^2} = \frac{\alpha^2 + \beta^2}{(\alpha\beta)^2} = \frac{(\alpha+\beta)^2 - 2\alpha\beta}{(\alpha\beta)^2} = \frac{4+2}{1} = 6$$

  - id: 8
    type: short_answer
    points: 5
    question: |
      이차방정식 $x^2 + ax + b = 0$의 두 근이 $x^2 - 5x + 3 = 0$의 두 근의 역수일 때, $a + b$의 값을 구하시오.
    answer: |
      $x^2 - 5x + 3 = 0$의 두 근을 $\alpha$, $\beta$라 하면
      $\alpha + \beta = 5$, $\alpha\beta = 3$
      새 근은 $\frac{1}{\alpha}$, $\frac{1}{\beta}$이므로
      $\frac{1}{\alpha} + \frac{1}{\beta} = \frac{5}{3}$, $\frac{1}{\alpha} \cdot \frac{1}{\beta} = \frac{1}{3}$
      따라서 $a = -\frac{5}{3}$, $b = \frac{1}{3}$
      $$a + b = -\frac{5}{3} + \frac{1}{3} = -\frac{4}{3}$$

  - id: 9
    type: short_answer
    points: 5
    question: |
      이차함수 $y = ax^2 + bx + c$의 그래프가 세 점 $(0, 3)$, $(1, 0)$, $(-1, 8)$을 지날 때, $a + b + c$의 값을 구하시오.
    answer: |
      $(0,3)$에서 $c = 3$, $(1,0)$에서 $a + b + 3 = 0$, $(-1,8)$에서 $a - b + 3 = 8$
      $a + b = -3$, $a - b = 5$이므로 $a = 1$, $b = -4$
      $$a + b + c = 1 - 4 + 3 = 0$$

  - id: 10
    type: short_answer
    points: 5
    question: |
      이차함수 $y = -x^2 + 4x + k$의 그래프와 $x$축이 만나는 두 점 사이의 거리가 $6$일 때, 상수 $k$의 값을 구하시오.
    answer: |
      $-x^2 + 4x + k = 0$, 즉 $x^2 - 4x - k = 0$
      두 근을 $\alpha$, $\beta$라 하면 $|\alpha - \beta| = 6$
      $(\alpha - \beta)^2 = (\alpha+\beta)^2 - 4\alpha\beta = 16 + 4k = 36$
      $$k = 5$$

  - id: 11
    type: multiple_choice
    points: 5
    question: |
      직각삼각형의 빗변의 길이가 $13$이고, 나머지 두 변의 길이의 차가 $7$일 때, 이 삼각형의 넓이는?
    choices:
      - "$20$"
      - "$25$"
      - "$30$"
      - "$35$"
    answer: 3

  - id: 12
    type: short_answer
    points: 5
    question: |
      좌표평면 위의 두 점 $A(1, 3)$, $B(7, 11)$에 대하여 선분 $AB$를 $1 : 3$으로 내분하는 점의 좌표를 구하시오.
    answer: |
      내분점 공식에 의해
      $$\left(\frac{1 \cdot 7 + 3 \cdot 1}{1+3},\; \frac{1 \cdot 11 + 3 \cdot 3}{1+3}\right) = \left(\frac{10}{4},\; \frac{20}{4}\right) = \left(\frac{5}{2},\; 5\right)$$

  - id: 13
    type: essay
    points: 5
    question: |
      한 변의 길이가 $a$인 정삼각형의 내접원의 반지름 $r$을 $a$로 나타내고, 풀이 과정을 서술하시오.
    answer: |
      정삼각형의 넓이를 두 가지로 표현한다.
      넓이 $= \frac{\sqrt{3}}{4}a^2$이고, 내접원을 이용하면 넓이 $= \frac{1}{2} \cdot 3a \cdot r$
      $$\frac{\sqrt{3}}{4}a^2 = \frac{3ar}{2} \implies r = \frac{\sqrt{3}}{6}a$$

  - id: 14
    type: short_answer
    points: 5
    question: |
      $\triangle ABC$에서 $\angle B = 90°$, $AB = 6$, $BC = 8$이다. 점 $B$에서 빗변 $AC$에 내린 수선의 발을 $H$라 할 때, $BH$의 길이를 구하시오.
    answer: |
      $AC = \sqrt{36 + 64} = 10$
      $\triangle ABC$의 넓이: $\frac{1}{2} \cdot 6 \cdot 8 = 24$
      $\frac{1}{2} \cdot AC \cdot BH = 24$이므로
      $$BH = \frac{48}{10} = \frac{24}{5}$$

  - id: 15
    type: short_answer
    points: 5
    question: |
      원 $O$에서 현 $AB$의 길이가 $12$이고, 원의 반지름이 $10$일 때, 원의 중심에서 현 $AB$까지의 거리를 구하시오.
    answer: |
      현의 중점을 $M$이라 하면 $AM = 6$, $OA = 10$
      $$OM = \sqrt{OA^2 - AM^2} = \sqrt{100 - 36} = 8$$

  - id: 16
    type: multiple_choice
    points: 5
    question: |
      원에 내접하는 사각형 $ABCD$에서 $\angle A = 70°$, $\angle B = 95°$일 때, $\angle D$의 크기는?
    choices:
      - "$80°$"
      - "$85°$"
      - "$90°$"
      - "$95°$"
    answer: 2

  - id: 17
    type: short_answer
    points: 5
    question: |
      원 $O$의 외부의 점 $P$에서 원에 그은 접선의 접점을 $T$, 원과 만나는 할선이 원과 만나는 두 점을 $A$, $B$라 하자. $PT = 8$, $PA = 4$일 때, $AB$의 길이를 구하시오.
    answer: |
      접선과 할선의 관계에 의해 $PT^2 = PA \cdot PB$
      $$64 = 4 \cdot PB \implies PB = 16$$
      $$AB = PB - PA = 16 - 4 = 12$$

  - id: 18
    type: essay
    points: 5
    question: |
      $\sin 45° + \cos 60° + \tan 30°$의 값을 구하고, 풀이 과정을 서술하시오.
    answer: |
      $\sin 45° = \frac{\sqrt{2}}{2}$, $\cos 60° = \frac{1}{2}$, $\tan 30° = \frac{\sqrt{3}}{3}$이므로
      $$\frac{\sqrt{2}}{2} + \frac{1}{2} + \frac{\sqrt{3}}{3} = \frac{3\sqrt{2} + 3 + 2\sqrt{3}}{6}$$

  - id: 19
    type: short_answer
    points: 5
    question: |
      높이가 $h$인 건물의 꼭대기에서 지면 위의 한 점을 내려다본 각이 $60°$이다. 그 점에서 건물까지의 수평 거리가 $20\,\text{m}$일 때, 건물의 높이 $h$를 구하시오.
    answer: |
      $\tan 60° = \frac{h}{20}$이므로
      $$h = 20\tan 60° = 20\sqrt{3}\;\text{m}$$

  - id: 20
    type: essay
    points: 5
    question: |
      $1$부터 $20$까지의 자연수 중에서 서로 다른 두 수를 뽑아 곱했을 때, 그 곱이 $4$의 배수가 될 확률을 구하고 풀이 과정을 서술하시오.
    answer: |
      전체 경우의 수: $\binom{20}{2} = 190$

      곱이 $4$의 배수가 **아닌** 경우를 구한다.
      - 두 수 모두 홀수: $\binom{10}{2} = 45$ (곱은 홀수)
      - 홀수 하나, ($4$의 배수가 아닌 짝수) 하나: 홀수 $10$개, $\{2, 6, 10, 14, 18\}$ $5$개 → $10 \times 5 = 50$

      곱이 $4$의 배수가 아닌 경우: $45 + 50 = 95$
      $$P = 1 - \frac{95}{190} = 1 - \frac{1}{2} = \frac{1}{2}$$
