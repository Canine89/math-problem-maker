  - id: 8
    type: short_answer
    points: 5
    question: |
      그림과 같이 이차함수 $y = x^2 - 2x - 3$의 그래프가 $x$축과 만나는
      두 점 $A$, $B$와 $y$축과 만나는 점 $C$에 대하여 $\triangle ABC$의 넓이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.55, line width=0.4pt]
        \draw[->] (-2,0) -- (4.5,0) node[right] {\small $x$};
        \draw[->] (0,-4.5) -- (0,3) node[above] {\small $y$};
        \draw[domain=-1.3:3.3, smooth, line width=0.6pt] plot (\x, {\x*\x - 2*\x - 3});
        \fill (-1,0) circle (1.5pt);
        \fill (3,0) circle (1.5pt);
        \fill (0,-3) circle (1.5pt);
        \draw[dashed, thin] (-1,0) -- (0,-3) -- (3,0);
        \node[above left] at (-1,0) {\small A};
        \node[above right] at (3,0) {\small B};
        \node[left] at (0,-3) {\small C};
        \node[below left] at (0,0) {\small O};
        \foreach \x in {-1,1,2,3} \draw (\x,0.1) -- (\x,-0.1) node[below] {\tiny $\x$};
        \foreach \y in {-3,-2,-1,1,2} \draw (0.1,\y) -- (-0.1,\y) node[left] {\tiny $\y$};
      \end{tikzpicture}
    answer: |
      $A(-1, 0)$, $B(3, 0)$, $C(0, -3)$
      $AB = 4$, 높이 $= 3$
      $$S = \frac{1}{2} \times 4 \times 3 = 6$$

  - id: 9
    type: short_answer
    points: 5
    question: |
      그림과 같이 이차함수 $y = a(x-p)^2 + q$의 그래프가 점 $(0, 5)$를 지나고
      꼭짓점이 $(2, 1)$일 때, $a$의 값을 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.55, line width=0.4pt]
        \draw[->] (-0.5,0) -- (5,0) node[right] {\small $x$};
        \draw[->] (0,-0.5) -- (0,7) node[above] {\small $y$};
        \draw[domain=-0.2:4.2, smooth, line width=0.6pt] plot (\x, {(\x-2)*(\x-2) + 1});
        \fill (0,5) circle (1.5pt);
        \fill (2,1) circle (1.5pt);
        \draw[dashed, thin] (2,0) -- (2,1);
        \node[left] at (0,5) {\small $(0,\,5)$};
        \node[below right] at (2,1) {\small $(2,\,1)$};
        \node[below left] at (0,0) {\small O};
        \foreach \x in {1,2,3,4} \draw (\x,0.1) -- (\x,-0.1) node[below] {\tiny $\x$};
        \foreach \y in {1,...,6} \draw (0.1,\y) -- (-0.1,\y) node[left] {\tiny $\y$};
      \end{tikzpicture}
    answer: |
      $y = a(x-2)^2 + 1$에 $(0, 5)$를 대입하면
      $5 = 4a + 1$이므로 $a = 1$

  - id: 10
    type: essay
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $a+b$인 정사각형을 이용하여
      $(a+b)^2 = a^2 + 2ab + b^2$임을 설명하시오.
    figure: |
      \begin{tikzpicture}[scale=0.7, line width=0.4pt]
        \def\a{3}
        \def\b{2}
        \def\s{5}
        \draw (0,0) rectangle (\s,\s);
        \draw (\a,0) -- (\a,\s);
        \draw (0,\b) -- (\s,\b);
        \node at (\a/2, \b+\a/2) {$a^2$};
        \node at (\a+\b/2, \b+\a/2) {$ab$};
        \node at (\a/2, \b/2) {$ab$};
        \node at (\a+\b/2, \b/2) {$b^2$};
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (0,0) -- node[below=7pt] {\small $a$} (\a,0);
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (\a,0) -- node[below=7pt] {\small $b$} (\s,0);
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (0,\b) -- node[left=7pt] {\small $b$} (0,0);
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (0,\s) -- node[left=7pt] {\small $a$} (0,\b);
      \end{tikzpicture}
    answer: |
      한 변의 길이가 $a+b$인 정사각형의 넓이는 $(a+b)^2$이다.
      그림과 같이 이 정사각형을 네 부분으로 나누면
      $a^2 + ab + ab + b^2 = a^2 + 2ab + b^2$
      따라서 $(a+b)^2 = a^2 + 2ab + b^2$
