title: "중학교 3학년 1학기 종합 문제"
subtitle: "중학교 3학년 1학기"
date: "2026-04-20"
time_limit: "60분"
total_points: 50

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      $\sqrt{12} + \sqrt{27} - \sqrt{48}$을 간단히 하시오.
    answer: |
      $2\sqrt{3} + 3\sqrt{3} - 4\sqrt{3} = \sqrt{3}$

  - id: 2
    type: short_answer
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $\sqrt{2}$인 정사각형 $ABCD$가 있다.
      이 정사각형의 대각선 $AC$의 길이를 구하시오.
    figure: |
      from geometry import Figure
      import math
      f = Figure(figsize=(4, 4))
      s = math.sqrt(2)
      A = (0, s)
      B = (0, 0)
      C = (s, 0)
      D = (s, s)
      f.rectangle((0, 0), s, s, labels={"A": "nw", "B": "sw", "C": "se", "D": "ne"})
      f.dashed(A, C)
      f.segment_label(B, C, "$\\sqrt{2}$", offset=-0.25)
      f.save(FIGURE_PATH)
    answer: |
      $AC = \sqrt{(\sqrt{2})^2 + (\sqrt{2})^2} = \sqrt{4} = 2$

  - id: 3
    type: multiple_choice
    points: 5
    question: |
      다항식 $x^2 - 6x + 9$를 인수분해하면?
    choices:
      - "$(x-3)(x+3)$"
      - "$(x-3)^2$"
      - "$(x+3)^2$"
      - "$(x-9)(x+1)$"
    answer: 2

  - id: 4
    type: short_answer
    points: 5
    question: |
      그림과 같이 직사각형 모양의 화단의 넓이가 $x^2 + 5x + 6$일 때,
      가로의 길이가 $x + 3$이면 세로의 길이를 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 3))
      f.rectangle((0, 0), 6, 3)
      f.region_label((3, 1.5), "$x^2 + 5x + 6$")
      f.dimension((0, 0), (6, 0), "$x + 3$", offset=-0.8)
      f.label((6.5, 1.5), "?", fontsize=14)
      f.save(FIGURE_PATH)
    answer: |
      $x^2 + 5x + 6 = (x+2)(x+3)$이므로 세로 $= x + 2$

  - id: 5
    type: short_answer
    points: 5
    question: |
      이차방정식 $x^2 - 7x + 12 = 0$의 두 근을 구하시오.
    answer: |
      $(x-3)(x-4) = 0$이므로 $x = 3$ 또는 $x = 4$

  - id: 6
    type: short_answer
    points: 5
    question: |
      그림과 같이 넓이가 $40\,\text{cm}^2$인 직각삼각형에서
      빗변을 제외한 두 변의 길이의 차가 $2\,\text{cm}$일 때,
      짧은 변의 길이를 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 4))
      A = (0, 10)
      B = (0, 0)
      C = (8, 0)
      f.triangle([A, B, C], labels={"A": A, "B": B, "C": C})
      f.right_angle(B, A, C, size=0.6)
      f.segment_label(A, B, "$x + 2$", offset=-0.9)
      f.segment_label(B, C, "$x$", offset=-0.5)
      f.region_label((2, 3), "$40\\,\\mathrm{cm}^2$")
      f.save(FIGURE_PATH)
    answer: |
      $\frac{1}{2} \cdot x(x+2) = 40$이므로 $x^2 + 2x - 80 = 0$
      $(x+10)(x-8) = 0$에서 $x > 0$이므로 $x = 8$
      짧은 변의 길이는 $8\,\text{cm}$

  - id: 7
    type: multiple_choice
    points: 5
    question: |
      이차함수 $y = x^2 - 4x + 3$의 꼭짓점의 좌표는?
    choices:
      - "$(2, 1)$"
      - "$(2, -1)$"
      - "$(-2, 1)$"
      - "$(-2, -1)$"
    answer: 2

  - id: 8
    type: short_answer
    points: 5
    question: |
      그림과 같이 이차함수 $y = x^2 - 2x - 3$의 그래프가 $x$축과 만나는
      두 점 $A$, $B$와 $y$축과 만나는 점 $C$에 대하여 $\triangle ABC$의 넓이를 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 4))
      f.coordinate_plane((-2, 5), (-5, 3))
      f.plot_function(lambda x: x**2 - 2*x - 3, (-1.5, 3.5), color="blue")
      A = (-1, 0)
      B = (3, 0)
      C = (0, -3)
      f.plot_points([A, B, C], labels=["A", "B", "C"])
      f.segment(A, C, style="--", color="gray")
      f.segment(B, C, style="--", color="gray")
      f.save(FIGURE_PATH, transparent=False)
    answer: |
      $x^2 - 2x - 3 = (x+1)(x-3) = 0$에서 $A(-1, 0)$, $B(3, 0)$
      $y$절편: $C(0, -3)$
      $AB = 4$, 높이 $= 3$
      $$S = \frac{1}{2} \times 4 \times 3 = 6$$

  - id: 9
    type: short_answer
    points: 5
    question: |
      그림과 같이 이차함수 $y = a(x-p)^2 + q$의 그래프가 점 $(0, 5)$를 지나고
      꼭짓점이 $(2, 1)$일 때, $a$의 값을 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 4))
      f.coordinate_plane((-1, 5), (-1, 7))
      f.plot_function(lambda x: (x-2)**2 + 1, (-0.3, 4.3), color="blue")
      f.plot_points([(2, 1), (0, 5)], labels=["(2, 1)", "(0, 5)"])
      f.dashed((2, 0), (2, 1), color="gray")
      f.save(FIGURE_PATH, transparent=False)
    answer: |
      $y = a(x-2)^2 + 1$에 $(0, 5)$를 대입하면
      $5 = a \cdot 4 + 1$이므로 $4a = 4$
      $$a = 1$$

  - id: 10
    type: essay
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $a+b$인 정사각형을 이용하여
      $(a+b)^2 = a^2 + 2ab + b^2$임을 설명하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 5))
      s = 5
      a = 3
      b = 2
      f.rectangle((0, 0), s, s)
      f.segment((a, 0), (a, s))
      f.segment((0, a), (s, a))
      f.region_label((a/2, a + b/2), "$a^2$")
      f.region_label((a + b/2, a + b/2), "$ab$")
      f.region_label((a/2, b/2), "$ab$")
      f.region_label((a + b/2, b/2), "$b^2$")
      f.brace((0, -0.1), (a, -0.1), "$a$", direction="below")
      f.brace((a, -0.1), (s, -0.1), "$b$", direction="below")
      f.brace((-0.1, 0), (-0.1, b), "$b$", direction="below")
      f.brace((-0.1, b), (-0.1, s), "$a$", direction="below")
      f.save(FIGURE_PATH)
    answer: |
      한 변의 길이가 $a+b$인 정사각형의 넓이는 $(a+b)^2$이다.
      그림과 같이 이 정사각형을 네 부분으로 나누면
      - 한 변이 $a$인 정사각형: 넓이 $a^2$
      - 한 변이 $b$인 정사각형: 넓이 $b^2$
      - 가로 $a$, 세로 $b$인 직사각형 2개: 넓이 $2ab$
      따라서 $(a+b)^2 = a^2 + 2ab + b^2$
