title: "중학교 3학년 1학기 종합 문제"
subtitle: "중학교 3학년 1학기"
date: "2026-04-20"
time_limit: "60분"
total_points: 50

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      $\sqrt{12} + \sqrt{27} - \sqrt{48}$을 간단히 하시오.
    answer: |
      $2\sqrt{3} + 3\sqrt{3} - 4\sqrt{3} = \sqrt{3}$

  - id: 2
    type: short_answer
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $\sqrt{2}$인 정사각형 $ABCD$가 있다.
      이 정사각형의 대각선 $AC$의 길이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=2, line width=0.4pt]
        \coordinate (A) at (0,1.414);
        \coordinate (B) at (0,0);
        \coordinate (C) at (1.414,0);
        \coordinate (D) at (1.414,1.414);
        \draw (A) -- (B) -- (C) -- (D) -- cycle;
        \draw[dashed] (A) -- (C);
        \node[above left] at (A) {A};
        \node[below left] at (B) {B};
        \node[below right] at (C) {C};
        \node[above right] at (D) {D};
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (B) -- node[below=7pt] {\small $\sqrt{2}$} (C);
      \end{tikzpicture}
    answer: |
      $AC = \sqrt{(\sqrt{2})^2 + (\sqrt{2})^2} = \sqrt{4} = 2$

  - id: 3
    type: multiple_choice
    points: 5
    question: |
      다항식 $x^2 - 6x + 9$를 인수분해하면?
    choices:
      - "$(x-3)(x+3)$"
      - "$(x-3)^2$"
      - "$(x+3)^2$"
      - "$(x-9)(x+1)$"
    answer: 2

  - id: 4
    type: short_answer
    points: 5
    question: |
      그림과 같이 직사각형 모양의 화단의 넓이가 $x^2 + 5x + 6$일 때,
      가로의 길이가 $x + 3$이면 세로의 길이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.7, line width=0.4pt]
        \draw (0,0) rectangle (6,3);
        \node at (3,1.5) {$x^2+5x+6$};
        \draw[decorate,decoration={brace,mirror,raise=5pt,amplitude=3pt}]
          (0,0) -- node[below=8pt] {\small $x+3$} (6,0);
        \draw[decorate,decoration={brace,mirror,raise=5pt,amplitude=3pt}]
          (6,0) -- node[right=8pt] {\small ?} (6,3);
      \end{tikzpicture}
    answer: |
      $x^2 + 5x + 6 = (x+2)(x+3)$이므로 세로 $= x + 2$

  - id: 5
    type: short_answer
    points: 5
    question: |
      이차방정식 $x^2 - 7x + 12 = 0$의 두 근을 구하시오.
    answer: |
      $(x-3)(x-4) = 0$이므로 $x = 3$ 또는 $x = 4$

  - id: 6
    type: short_answer
    points: 5
    question: |
      그림과 같이 넓이가 $40\,\text{cm}^2$인 직각삼각형에서
      빗변을 제외한 두 변의 길이의 차가 $2\,\text{cm}$일 때,
      짧은 변의 길이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.45, line width=0.4pt]
        \coordinate (A) at (0,10);
        \coordinate (B) at (0,0);
        \coordinate (C) at (8,0);
        \draw (A) -- (B) -- (C) -- cycle;
        \draw (0,0.5) -- (0.5,0.5) -- (0.5,0);
        \node[above left] at (A) {A};
        \node[below left] at (B) {B};
        \node[below right] at (C) {C};
        \draw[decorate,decoration={brace,mirror,raise=5pt,amplitude=3pt}]
          (A) -- node[left=8pt] {\small $x+2$} (B);
        \draw[decorate,decoration={brace,mirror,raise=5pt,amplitude=3pt}]
          (B) -- node[below=8pt] {\small $x$} (C);
        \node at (3,4) {\small $40\,\mathrm{cm}^2$};
      \end{tikzpicture}
    answer: |
      $\frac{1}{2} x(x+2) = 40$이므로 $x^2 + 2x - 80 = 0$
      $(x+10)(x-8) = 0$에서 $x > 0$이므로 $x = 8$
      짧은 변의 길이는 $8\,\text{cm}$

  - id: 7
    type: multiple_choice
    points: 5
    question: |
      이차함수 $y = x^2 - 4x + 3$의 꼭짓점의 좌표는?
    choices:
      - "$(2, 1)$"
      - "$(2, -1)$"
