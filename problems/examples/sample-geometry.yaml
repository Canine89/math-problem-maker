title: "도형 문제 예시"
subtitle: "중학교 3학년 | 도형"
date: "2026-04-20"
total_points: 25

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      그림과 같이 직사각형 위에 두 개의 정사각형이 놓여 있다.
      $S_1 = 4$, $a = 2$, $b = 8$일 때, $S_2$의 값을 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(6, 4))
      f.rectangle((0, 0), 10, 2)
      f.rectangle((2, 0), 2, 4)
      f.rectangle((4, 0), 4, 6)
      f.region_label((3, 1), "$S_1$")
      f.region_label((6, 3), "$S_2$")
      f.label((0, 0), "A", offset=(-0.4, -0.4))
      f.label((2, 0), "B", offset=(0, -0.5))
      f.label((4, 0), "D", offset=(0, -0.5))
      f.label((10, 0), "C", offset=(0.4, -0.4))
      f.brace((0, -0.1), (2, -0.1), "$a$", direction="below")
      f.brace((2, -0.1), (10, -0.1), "$b$", direction="below")
      f.save(FIGURE_PATH)
    answer: |
      $S_2 = 16$

  - id: 2
    type: short_answer
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $\sqrt{50}$인 정사각형 $OAEC$가 있고,
      점 $O$를 중심으로 반지름 $OB$인 사분원이 있다. $OB$의 길이를 구하시오.
    figure: |
      from geometry import Figure
      import math
      f = Figure(figsize=(5, 5))
      sq = 5
      R = sq * math.sqrt(2)
      f.arc((0, 0), R, 0, 90)
      f.rectangle((0, 0), sq, sq)
      f.segment((0, 0), (sq, sq))
      f.dashed((0, sq), (sq, 0))
      f.segment((0, 0), (R, 0))
      f.label((0, 0), "O", offset=(-0.5, -0.5))
      f.label((R, 0), "B", offset=(0.4, -0.4))
      f.label((0, sq), "C", offset=(-0.5, 0.2))
      f.label((sq, sq), "A", offset=(-0.2, 0.4))
      f.label((sq, sq), "D", offset=(0.5, 0.0))
      f.label((sq, 0), "E", offset=(0, -0.5))
      f.segment_label((0, 0), (0, sq), "$\\sqrt{50}$", offset=-0.9)
      f.save(FIGURE_PATH)
    answer: |
      $OB = OA = \sqrt{50}$이고 정사각형의 대각선이므로
      $$OB = \sqrt{(\sqrt{50})^2 + (\sqrt{50})^2} = \sqrt{100} = 10$$

  - id: 3
    type: short_answer
    points: 5
    question: |
      그림과 같이 $\triangle ABC$에서 $\angle B = 90°$, $AB = 6$, $BC = 8$이다.
      점 $B$에서 빗변 $AC$에 내린 수선의 발을 $H$라 할 때, $BH$의 길이를 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 4))
      A = (0, 6)
      B = (0, 0)
      C = (8, 0)
      H = (2.88, 2.16)
      f.triangle([A, B, C], labels={"A": A, "B": B, "C": C})
      f.right_angle(B, A, C, size=0.5)
      f.dashed(B, H)
      f.point(H, label="H", offset=(0.3, 0.3), size=3)
      f.segment_label(A, B, "6", offset=-0.5)
      f.segment_label(B, C, "8", offset=-0.5)
      f.save(FIGURE_PATH)
    answer: |
      $AC = 10$, 넓이 $= 24$이므로 $BH = \frac{48}{10} = \frac{24}{5}$

  - id: 4
    type: multiple_choice
    points: 5
    question: |
      그림의 좌표평면에서 이차함수 $y = -x^2 + 4x$의 꼭짓점의 좌표는?
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 4))
      f.coordinate_plane((-1, 6), (-1, 5))
      f.plot_function(lambda x: -x**2 + 4*x, (-0.5, 4.5), color="blue")
      f.plot_points([(2, 4)], labels=["(2, 4)"])
      f.save(FIGURE_PATH, transparent=False)
    choices:
      - "$(1, 3)$"
      - "$(2, 4)$"
      - "$(3, 3)$"
      - "$(4, 0)$"
    answer: 2

  - id: 5
    type: short_answer
    points: 5
    question: |
      그림과 같이 원 $O$에 내접하는 정육각형의 한 변의 길이가 $4$일 때,
      원의 넓이를 구하시오.
    figure: |
      from geometry import Figure
      f = Figure(figsize=(5, 5))
      f.circle((0, 0), 4)
      f.inscribed_polygon((0, 0), 4, 6, rotation=90, labels=["A","B","C","D","E","F"])
      f.point((0, 0), label="O", offset=(0.3, -0.3), size=3)
      f.segment((0, 0), (0, 4), style="--")
      f.segment_label((0, 0), (0, 4), "4", offset=0.4)
      f.save(FIGURE_PATH)
    answer: |
      정육각형의 한 변 $= $ 반지름이므로 $r = 4$
      $$S = \pi r^2 = 16\pi$$
