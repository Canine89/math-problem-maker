title: "도형 문제 예시 (TikZ)"
subtitle: "중학교 3학년 | 도형"
date: "2026-04-20"
total_points: 25

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      그림과 같이 직사각형 위에 두 개의 정사각형이 놓여 있다.
      $S_1 = 4$, $a = 2$, $b = 8$일 때, $S_2$의 값을 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.45, line width=0.4pt]
        \draw (0,0) rectangle (10,2);
        \draw (2,0) rectangle (4,4);
        \draw (4,0) rectangle (8,6);
        \node at (3,1) {\small $S_1$};
        \node at (6,3) {\small $S_2$};
        \node[below left] at (0,0) {A};
        \node[below] at (2,0) {B};
        \node[below] at (4,0) {D};
        \node[below right] at (10,0) {C};
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (0,0) -- node[below=7pt] {\small $a$} (2,0);
        \draw[decorate,decoration={brace,mirror,raise=4pt,amplitude=3pt}]
          (2,0) -- node[below=7pt] {\small $b$} (10,0);
      \end{tikzpicture}
    answer: |
      $S_2 = 16$

  - id: 2
    type: short_answer
    points: 5
    question: |
      그림과 같이 한 변의 길이가 $\sqrt{50}$인 정사각형 $OCAE$가 있고,
      점 $O$를 중심으로 반지름 $OB$인 사분원이 있다. $OB$의 길이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.55, line width=0.4pt]
        \def\s{5}
        \def\R{7.07}
        \draw (0,0) rectangle (\s,\s);
        \draw (0,0) -- (\s,\s);
        \draw[dashed] (0,\s) -- (\s,0);
        \draw (0,0) -- (\R,0);
        \draw (\R,0) arc (0:90:\R);
        \node[below left] at (0,0) {O};
        \node[below right] at (\R,0) {B};
        \node[left] at (0,\s) {C};
        \node[above] at (\s,\s) {A};
        \node[right] at (\s,\s) {D};
        \node[below] at (\s,0) {E};
        \node[left] at (0,2.5) {\small $\sqrt{50}$};
      \end{tikzpicture}
    answer: |
      $OB = \sqrt{50 + 50} = \sqrt{100} = 10$

  - id: 3
    type: short_answer
    points: 5
    question: |
      그림과 같이 $\triangle ABC$에서 $\angle B = 90°$, $AB = 6$, $BC = 8$이다.
      점 $B$에서 빗변 $AC$에 내린 수선의 발을 $H$라 할 때, $BH$의 길이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.5, line width=0.4pt]
        \coordinate (A) at (0,6);
        \coordinate (B) at (0,0);
        \coordinate (C) at (8,0);
        \coordinate (H) at (2.88,2.16);
        \draw (A) -- (B) -- (C) -- cycle;
        \draw[dashed] (B) -- (H);
        \draw (0,0.4) -- (0.4,0.4) -- (0.4,0);
        \fill (H) circle (1.5pt);
        \node[above left] at (A) {A};
        \node[below left] at (B) {B};
        \node[below right] at (C) {C};
        \node[above right] at (H) {\small H};
        \node[left] at (0,3) {\small $6$};
        \node[below] at (4,0) {\small $8$};
      \end{tikzpicture}
    answer: |
      $AC = 10$, 넓이 $= 24$이므로 $BH = \frac{24}{5}$

  - id: 4
    type: multiple_choice
    points: 5
    question: |
      그림의 좌표평면에서 이차함수 $y = -x^2 + 4x$의 꼭짓점의 좌표는?
    figure: |
      \begin{tikzpicture}[scale=0.6, line width=0.4pt]
        \draw[->] (-0.5,0) -- (5,0) node[right] {\small $x$};
        \draw[->] (0,-0.5) -- (0,5) node[above] {\small $y$};
        \draw[domain=-0.3:4.3, smooth, line width=0.6pt] plot (\x, {-\x*\x + 4*\x});
        \fill (2,4) circle (1.5pt);
        \node[above right] at (2,4) {\small $(2,\,4)$};
        \node[below left] at (0,0) {\small O};
        \foreach \x in {1,2,3,4} \draw (\x,0.08) -- (\x,-0.08) node[below] {\tiny \x};
        \foreach \y in {1,2,3,4} \draw (0.08,\y) -- (-0.08,\y) node[left] {\tiny \y};
      \end{tikzpicture}
    choices:
      - "$(1, 3)$"
      - "$(2, 4)$"
      - "$(3, 3)$"
      - "$(4, 0)$"
    answer: 2

  - id: 5
    type: short_answer
    points: 5
    question: |
      그림과 같이 원 $O$에 내접하는 정육각형의 한 변의 길이가 $4$일 때,
      원의 넓이를 구하시오.
    figure: |
      \begin{tikzpicture}[scale=0.55, line width=0.4pt]
        \draw (0,0) circle (4);
        \foreach \i in {0,...,5} {
          \coordinate (P\i) at ({90+60*\i}:4);
        }
        \draw (P0) -- (P1) -- (P2) -- (P3) -- (P4) -- (P5) -- cycle;
        \draw[dashed] (0,0) -- (P0);
        \fill (0,0) circle (1.5pt);
        \node[below right] at (0,0) {\small O};
        \node[above] at (P0) {\small A};
        \node[above left] at (P1) {\small B};
        \node[below left] at (P2) {\small C};
        \node[below] at (P3) {\small D};
        \node[below right] at (P4) {\small E};
        \node[above right] at (P5) {\small F};
        \node[right] at (0,2) {\small $4$};
      \end{tikzpicture}
    answer: |
      정육각형의 한 변 $= $ 반지름이므로 $r = 4$
      $$S = \pi r^2 = 16\pi$$
