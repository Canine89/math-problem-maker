title: "미적분 연습 문제"
subtitle: "고등학교 3학년"
date: "2026-04-20"
time_limit: "50분"
total_points: 30

problems:
  - id: 1
    type: short_answer
    points: 5
    question: |
      함수 $f(x) = x^3 - 3x^2 + 2x$의 극값을 구하시오.
    answer: |
      $f'(x) = 3x^2 - 6x + 2 = 0$이므로
      $$x = \frac{6 \pm \sqrt{36 - 24}}{6} = \frac{6 \pm 2\sqrt{3}}{6} = 1 \pm \frac{\sqrt{3}}{3}$$

  - id: 2
    type: multiple_choice
    points: 3
    question: |
      $\displaystyle\int_0^1 x^2\,dx$의 값은?
    choices:
      - "$\\frac{1}{2}$"
      - "$\\frac{1}{3}$"
      - "$\\frac{1}{4}$"
      - "$1$"
    answer: 2

  - id: 3
    type: short_answer
    points: 5
    question: |
      $\displaystyle\lim_{x \to 0} \frac{\sin x}{x}$의 값을 구하시오.
    answer: |
      $1$

  - id: 4
    type: multiple_choice
    points: 3
    question: |
      함수 $f(x) = e^{2x}$의 도함수는?
    choices:
      - "$e^{2x}$"
      - "$2e^{2x}$"
      - "$2xe^{2x}$"
      - "$e^{2x+1}$"
    answer: 2

  - id: 5
    type: essay
    points: 7
    question: |
      다음 정적분의 값을 구하고 풀이 과정을 서술하시오.
      $$\int_0^{\pi} \sin^2 x\,dx$$
    answer: |
      반각 공식 $\sin^2 x = \frac{1 - \cos 2x}{2}$를 이용하면
      $$\int_0^{\pi} \sin^2 x\,dx = \int_0^{\pi} \frac{1 - \cos 2x}{2}\,dx = \frac{1}{2}\left[x - \frac{\sin 2x}{2}\right]_0^{\pi} = \frac{\pi}{2}$$

  - id: 6
    type: short_answer
    points: 7
    question: |
      곡선 $y = x^2$과 직선 $y = 2x$로 둘러싸인 영역의 넓이를 구하시오.
    answer: |
      교점: $x^2 = 2x$에서 $x(x-2) = 0$이므로 $x = 0, 2$
      $$S = \int_0^2 (2x - x^2)\,dx = \left[x^2 - \frac{x^3}{3}\right]_0^2 = 4 - \frac{8}{3} = \frac{4}{3}$$
